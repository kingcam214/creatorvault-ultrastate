name: Deploy to CreatorVault VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate release stamp
        run: |
          echo "{\"commit\":\"${{ github.sha }}\",\"branch\":\"${{ github.ref_name }}\",\"timestamp\":\"$(date -Iseconds)\",\"environment\":\"production\"}" > public/release.json

      - name: Sync repo to VPS and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.CREATORVAULT_VPS_HOST }}
          username: ${{ secrets.CREATORVAULT_VPS_USER }}
          key: ${{ secrets.CREATORVAULT_VPS_SSH_KEY }}
          port: 22
          script: |
            set -euo pipefail

            cd /root/creatorvault

            git fetch origin main
            git checkout main
            git reset --hard origin/main

            pnpm install --frozen-lockfile
            pnpm build

            chmod +x ./deploy_work_to_prod.sh
            ./deploy_work_to_prod.sh

            pm2 reload all || pm2 restart all
