name: TypeScript Check

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  typecheck:
    name: Zero TypeScript Errors
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check (must be 0 errors)
        run: |
          ERROR_COUNT=$(npx tsc --noEmit 2>&1 | grep "error TS" | wc -l)
          if [ "$ERROR_COUNT" -gt "0" ]; then
            echo "❌ $ERROR_COUNT TypeScript error(s) found:"
            npx tsc --noEmit 2>&1 | grep "error TS"
            exit 1
          fi
          echo "✅ TypeScript check passed (0 errors)"
